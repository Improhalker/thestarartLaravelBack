name: Deploy Laravel API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, xml, curl, zip, intl

      - name: Instalar Dependências (Composer)
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      - name: Deploy via SSH (Rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "/"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: "/var/www/thestarart-api"
          EXCLUDE: "/node_modules/, /tests/, /storage/logs/, .env, .git/"

      - name: Comandos Pós-Deploy na VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true 
          script: |
            cd /var/www/thestarart-api
            
            # Garante que o diretório existe e as pastas de escrita também
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p bootstrap/cache

            # Ajuste de permissões (silencioso para não encher o log)
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            
            # Comandos do Laravel com flags de não-interação
            # O --force é vital para rodar migrations em produção
            php artisan migrate --force --no-interaction
            
            # Limpa caches antes de gerar novos para evitar conflitos de caminhos antigos
            php artisan config:clear
            php artisan route:clear
            
            # Gera os caches de performance
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache